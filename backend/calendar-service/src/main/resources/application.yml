server:
  port: 8082

spring:
  application:
    name: calendar-service
  datasource:
    url: jdbc:h2:mem:calendardb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect

management:
  endpoints:
    web:
      exposure:
        include: health

jwt:
  secret: familycalendar-secret-key-2024-very-long-secret-for-hs256-algorithm
