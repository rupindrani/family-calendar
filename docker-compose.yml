services:
  user-service:
    build: ./backend/user-service
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  calendar-service:
    build: ./backend/calendar-service
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  todo-service:
    build: ./backend/todo-service
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      user-service:
        condition: service_healthy
      calendar-service:
        condition: service_healthy
      todo-service:
        condition: service_healthy
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - CALENDAR_SERVICE_URL=http://calendar-service:8082
      - TODO_SERVICE_URL=http://todo-service:8083

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
