server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;

    # All API routes proxy directly to each service
    # nginx preserves all request headers (including Authorization + Content-Type) by default

    location /api/auth/ {
        proxy_pass http://user-service:8081/api/auth/;
    }

    location /api/families/ {
        proxy_pass http://user-service:8081/api/families/;
    }

    location /api/users/ {
        proxy_pass http://user-service:8081/api/users/;
    }

    location /api/events/ {
        proxy_pass http://calendar-service:8082/api/events/;
    }

    location /api/todos/ {
        proxy_pass http://todo-service:8083/api/todos/;
    }

    # React router — serve index.html for all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}